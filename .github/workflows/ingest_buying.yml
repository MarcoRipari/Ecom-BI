name: Ingest Buying

on:
  workflow_dispatch:
  push:
    paths:
      - "data/raw/buying.csv"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ingestion
      env:
        PYTHONIOENCODING: utf-8
      run: python src/ingest_data.py buying

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/storici/buying.parquet data/raw/buying.csv || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-ingest buying [skip ci]" && git push)
